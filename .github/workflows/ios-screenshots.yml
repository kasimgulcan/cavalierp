name: iOS App Store Screenshots

on:
  workflow_dispatch:

jobs:
  screenshots:
    runs-on: macos-latest
    timeout-minutes: 45

    env:
      SCREENSHOT_OUT: ${{ github.workspace }}/collected-screenshots

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        working-directory: mobile
        run: flutter pub get

      - name: Install CocoaPods
        working-directory: mobile/ios
        run: pod install

      - name: Boot iPhone simulator
        run: |
          sudo xcode-select -s /Applications/Xcode.app/Contents/Developer
          xcrun simctl list devices available || true

          eval "$(python3 <<'PY'
          import json, subprocess, sys

          def score(name: str) -> int:
              n = name.lower()
              if "pro max" in n: return 100
              if "plus" in n: return 90
              if " pro" in n or n.endswith(" pro"): return 80
              if "mini" in n or "se" in n: return 20
              return 50

          def collect(available_only):
              flag = ["available"] if available_only else []
              data = json.loads(subprocess.check_output(
                  ["xcrun", "simctl", "list", "devices", *flag, "-j"], text=True,
              ))
              out = []
              for runtime in sorted(data["devices"].keys(), reverse=True):
                  if "ios" not in runtime.lower():
                      continue
                  for device in data["devices"][runtime]:
                      name = device.get("name", "")
                      if "iphone" not in name.lower():
                          continue
                      if available_only and device.get("isAvailable") is False:
                          continue
                      out.append((score(name), runtime, name, device["udid"]))
              return out

          candidates = collect(True) or collect(False)
          if not candidates:
              subprocess.run(["xcrun", "simctl", "list", "devices"], check=False)
              raise SystemExit("No iPhone simulator found")

          candidates.sort(key=lambda x: (x[0], x[1]), reverse=True)
          _, runtime, name, udid = candidates[0]
          print(f"Selected: {name} ({udid}) on {runtime}", file=sys.stderr)
          print(f"export DEVICE_ID={udid}")
          print(f"export DEVICE_NAME='{name}'")
          PY
          )"

          echo "DEVICE_ID=$DEVICE_ID" >> "$GITHUB_ENV"
          echo "DEVICE_NAME=$DEVICE_NAME" >> "$GITHUB_ENV"
          xcrun simctl boot "$DEVICE_ID" 2>/dev/null || true
          xcrun simctl bootstatus "$DEVICE_ID" -b
          open -a Simulator || true
          flutter devices

      - name: Build iOS simulator app
        working-directory: mobile
        run: flutter build ios --simulator --debug

      - name: Capture all screenshots with flutter drive
        id: drive
        timeout-minutes: 15
        continue-on-error: true
        env:
          SCREENSHOT_EMAIL: ${{ secrets.SCREENSHOT_DEMO_EMAIL }}
          SCREENSHOT_PASSWORD: ${{ secrets.SCREENSHOT_DEMO_PASSWORD }}
        run: |
          mkdir -p "$SCREENSHOT_OUT"
          APP_PATH=$(find mobile/build/ios/iphonesimulator -name "Runner.app" -type d | head -1)
          bash scripts/ios_drive_screenshots.sh \
            "$DEVICE_ID" \
            "$APP_PATH" \
            "$SCREENSHOT_EMAIL" \
            "$SCREENSHOT_PASSWORD" \
            "$GITHUB_WORKSPACE/flutter-drive.log" \
            "$SCREENSHOT_OUT"

      - name: Count screenshots after drive
        id: after_drive
        if: always()
        run: |
          bash scripts/gather_screenshots.sh "$SCREENSHOT_OUT"
          count=$(find "$SCREENSHOT_OUT" -maxdepth 1 -name '*.png' 2>/dev/null | wc -l | tr -d ' ')
          echo "count=$count" >> "$GITHUB_OUTPUT"
          echo "Screenshot count after drive: $count"

      - name: Fallback — login screenshot only
        id: fallback
        if: always() && (steps.drive.outcome != 'success' || steps.after_drive.outputs.count < '2')
        timeout-minutes: 12
        working-directory: mobile
        run: |
          set -euo pipefail
          mkdir -p "$SCREENSHOT_OUT"
          LOG="$GITHUB_WORKSPACE/flutter-run.log"
          APP_PATH=$(find build/ios/iphonesimulator -name "Runner.app" -type d | head -1)
          : > "$LOG"
          flutter run -d "$DEVICE_ID" \
            --use-application-binary="$APP_PATH" \
            --dart-define=SCREENSHOT_EMAIL="${{ secrets.SCREENSHOT_DEMO_EMAIL }}" \
            --dart-define=SCREENSHOT_PASSWORD="${{ secrets.SCREENSHOT_DEMO_PASSWORD }}" \
            >> "$LOG" 2>&1 &
          RUN_PID=$!
          echo "RUN_PID=$RUN_PID" >> "$GITHUB_ENV"
          bash "$GITHUB_WORKSPACE/scripts/ios_wait_and_screenshot.sh" \
            "$DEVICE_ID" \
            "$SCREENSHOT_OUT" \
            01-login \
            "$LOG"
          kill -INT "$RUN_PID" 2>/dev/null || true
          wait "$RUN_PID" 2>/dev/null || true
          bash "$GITHUB_WORKSPACE/scripts/gather_screenshots.sh" "$SCREENSHOT_OUT"

      - name: Collect and validate screenshots
        if: always()
        run: |
          bash scripts/gather_screenshots.sh "$SCREENSHOT_OUT"
          cd "$SCREENSHOT_OUT"
          ls -la
          ok=0
          count=0
          for f in *.png; do
            [ -f "$f" ] || continue
            count=$((count + 1))
            size=$(stat -f%z "$f" 2>/dev/null || stat -c%s "$f")
            echo "$f: $size bytes"
            if [ "$size" -ge 80000 ]; then ok=1; fi
          done
          echo "Total PNG count: $count"
          if [ "$ok" -ne 1 ]; then
            echo "No valid screenshots (need PNG >= 80 KB with visible UI)."
            exit 1
          fi
          if [ "$count" -lt 3 ]; then
            echo "::warning::Only $count screenshot(s) captured; App Store prefers 3-5."
          fi

      - name: Upload screenshots
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: app-store-screenshots
          path: collected-screenshots/
          retention-days: 30
          if-no-files-found: warn

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: flutter-logs
          path: |
            flutter-drive.log
            flutter-run.log
          retention-days: 7
          if-no-files-found: ignore

      - name: Cleanup Flutter processes
        if: always()
        run: |
          if [ -n "${RUN_PID:-}" ]; then
            kill -INT "$RUN_PID" 2>/dev/null || true
          fi
          pkill -f "flutter run" 2>/dev/null || true
          pkill -f "flutter drive" 2>/dev/null || true
          pkill -f "flutter_tools" 2>/dev/null || true
