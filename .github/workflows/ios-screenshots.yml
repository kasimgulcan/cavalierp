name: iOS App Store Screenshots

on:
  workflow_dispatch:

jobs:
  screenshots:
    runs-on: macos-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Flutter doctor
        working-directory: mobile
        run: flutter doctor -v

      - name: Install dependencies
        working-directory: mobile
        run: flutter pub get

      - name: Install CocoaPods
        working-directory: mobile/ios
        run: pod install

      - name: Boot iPhone simulator
        run: |
          sudo xcode-select -s /Applications/Xcode.app/Contents/Developer
          xcrun simctl list devices available || true

          DEVICE_ID=$(python3 <<'PY'
          import json, subprocess, sys

          def load_devices():
              return json.loads(subprocess.check_output(
                  ["xcrun", "simctl", "list", "devices", "available", "-j"],
                  text=True,
              ))

          def score(name: str) -> int:
              n = name.lower()
              if "pro max" in n:
                  return 100
              if "plus" in n:
                  return 90
              if " pro" in n or n.endswith(" pro"):
                  return 80
              if "mini" in n or "se" in n:
                  return 20
              return 50

          data = load_devices()
          candidates = []
          for runtime in sorted(data["devices"].keys(), reverse=True):
              if "ios" not in runtime.lower():
                  continue
              for device in data["devices"][runtime]:
                  name = device.get("name", "")
                  if "iphone" not in name.lower():
                      continue
                  if device.get("isAvailable") is False:
                      continue
                  candidates.append((score(name), runtime, name, device["udid"]))

          if not candidates:
              print("No iPhone in 'available' list, retrying full device list...", file=sys.stderr)
              data = json.loads(subprocess.check_output(
                  ["xcrun", "simctl", "list", "devices", "-j"], text=True,
              ))
              for runtime in sorted(data["devices"].keys(), reverse=True):
                  if "ios" not in runtime.lower():
                      continue
                  for device in data["devices"][runtime]:
                      name = device.get("name", "")
                      if "iphone" not in name.lower():
                          continue
                      candidates.append((score(name), runtime, name, device["udid"]))

          if not candidates:
              print("Available simulators:", file=sys.stderr)
              subprocess.run(["xcrun", "simctl", "list", "devices"], check=False)
              raise SystemExit("No iPhone simulator found")

          candidates.sort(key=lambda x: (x[0], x[1]), reverse=True)
          best = candidates[0]
          print(f"Selected: {best[2]} ({best[3]}) on {best[1]}", file=sys.stderr)
          print(best[3])
          PY
          )

          echo "Using simulator UDID: $DEVICE_ID"
          echo "DEVICE_ID=$DEVICE_ID" >> "$GITHUB_ENV"
          xcrun simctl boot "$DEVICE_ID" 2>/dev/null || true
          xcrun simctl bootstatus "$DEVICE_ID" -b
          open -a Simulator || true
          flutter devices

      - name: Capture screenshots with flutter drive
        id: drive
        continue-on-error: true
        working-directory: mobile
        env:
          SCREENSHOT_EMAIL: ${{ secrets.SCREENSHOT_DEMO_EMAIL }}
          SCREENSHOT_PASSWORD: ${{ secrets.SCREENSHOT_DEMO_PASSWORD }}
        run: |
          flutter drive \
            --driver=test_driver/integration_test.dart \
            --target=integration_test/app_screenshots_test.dart \
            -d "$DEVICE_ID" \
            --dart-define=SCREENSHOT_EMAIL="$SCREENSHOT_EMAIL" \
            --dart-define=SCREENSHOT_PASSWORD="$SCREENSHOT_PASSWORD"

      - name: Fallback login screenshot via simctl
        if: steps.drive.outcome != 'success' && env.DEVICE_ID != ''
        run: |
          mkdir -p collected-screenshots
          cd mobile
          flutter build ios --simulator --debug
          APP_PATH=$(find build/ios/iphonesimulator -name "Runner.app" -type d | head -1)
          if [ -z "$APP_PATH" ]; then
            echo "Runner.app not found"
            find build -name "*.app" || true
            exit 1
          fi
          xcrun simctl install "$DEVICE_ID" "$APP_PATH"
          xcrun simctl launch "$DEVICE_ID" com.csmstok.csmStokMobile
          sleep 12
          xcrun simctl io "$DEVICE_ID" screenshot ../collected-screenshots/01-login-fallback.png

      - name: Collect screenshot files
        if: always()
        run: |
          mkdir -p collected-screenshots
          for dir in \
            mobile/screenshots \
            mobile/integration_test/screenshots \
            mobile/build/integration_test \
            mobile/build/host \
            collected-screenshots
          do
            if [ -d "$dir" ]; then
              find "$dir" -maxdepth 3 -name '*.png' -exec cp {} collected-screenshots/ \; 2>/dev/null || true
            fi
          done
          find mobile -path '*screenshots*' -name '*.png' -exec cp {} collected-screenshots/ \; 2>/dev/null || true
          cd collected-screenshots
          ls -la
          if [ -z "$(ls -A . 2>/dev/null)" ]; then
            echo "No screenshots found"
            find ../mobile -name '*.png' \
              ! -path '*/Assets.xcassets/*' \
              ! -path '*/android/*' \
              ! -path '*/macos/*' \
              | head -30 || true
            exit 1
          fi

      - name: Upload screenshots
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: app-store-screenshots
          path: collected-screenshots/
          retention-days: 30
          if-no-files-found: warn
